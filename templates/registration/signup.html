<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
</head>
<body>

    <h2>Crear una nueva cuenta</h2>

    <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}

        <button type="submit">Registrarse</button>
    </form>

    <p>¿Ya tienes cuenta? <a href="#">Inicia sesión aquí</a></p>

</body>
</html>
